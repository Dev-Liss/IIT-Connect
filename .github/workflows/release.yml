# ============================================================
#  IIT Connect — Official Release Pipeline
#  Triggers: Push of a semantic version tag (e.g. v1.0.1)
#  Pipeline :
#    1. Bump version in app.json to match the git tag
#    2. Build signed production APK via EAS
#    3. Download the APK artifact from the EAS API
#    4. Create a GitHub Release and attach the APK
# ============================================================

name: 🚀 Release — Build & Publish APK

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.0.1, v2.3.0

# One release per tag; do NOT cancel in-progress builds.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1 — Bump version in app.json to match the pushed tag
  #         and commit it back so the build is traceable.
  # ────────────────────────────────────────────────────────────
  bump-version:
    name: 📝 Bump app.json version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    outputs:
      new_version: ${{ steps.set_version.outputs.version }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          # We need to push a commit — use a PAT that bypasses
          # branch protection if your main branch is protected.
          token: ${{ secrets.GH_PAT }}

      - name: 🏷️ Extract version from tag
        id: set_version
        run: |
          # Strip the leading 'v' → "1.0.1"
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ✏️ Update version in app.json
        run: |
          VERSION="${{ steps.set_version.outputs.version }}"
          node -e "
            const fs   = require('fs');
            const path  = 'app.json';
            const json  = JSON.parse(fs.readFileSync(path, 'utf8'));
            json.expo.version = '$VERSION';
            fs.writeFileSync(path, JSON.stringify(json, null, 2) + '\n');
            console.log('app.json updated → version:', json.expo.version);
          "

      - name: 📤 Commit updated app.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.set_version.outputs.version }} [skip ci]"
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

  # ────────────────────────────────────────────────────────────
  # JOB 2 — Build the production APK using EAS Cloud
  # ────────────────────────────────────────────────────────────
  eas-release-build:
    name: 🏗️ EAS Production Build
    runs-on: ubuntu-latest
    needs: bump-version
    defaults:
      run:
        working-directory: mobile-app
    outputs:
      build_id: ${{ steps.get_build_id.outputs.build_id }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull the version-bump commit made in the previous job
          ref: main

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile-app/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 EAS Build — production profile
        id: get_build_id
        run: |
          # Build and capture the EAS build ID for download later.
          # --wait  blocks until cloud build finishes (≈ 10-20 min).
          BUILD_OUTPUT=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --json \
            --wait 2>&1)

          echo "EAS output: $BUILD_OUTPUT"

          # Extract the build ID from the JSON response
          BUILD_ID=$(echo "$BUILD_OUTPUT" | jq -r '.[0].id // empty')
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "Build ID: $BUILD_ID"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: ⬇️ Download APK from EAS
        id: download_apk
        run: |
          BUILD_ID="${{ steps.get_build_id.outputs.build_id }}"
          # Poll EAS REST API for the artifact download URL
          APK_URL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.EXPO_TOKEN }}" \
            "https://api.expo.dev/v2/builds/$BUILD_ID" \
            | jq -r '.data.artifacts.buildUrl')

          echo "APK URL: $APK_URL"
          curl -L -o "../IIT-Connect-${{ needs.bump-version.outputs.new_version }}.apk" "$APK_URL"
          echo "apk_path=IIT-Connect-${{ needs.bump-version.outputs.new_version }}.apk" >> "$GITHUB_OUTPUT"
        working-directory: ${{ github.workspace }}

      - name: 📦 Upload APK as workflow artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: IIT-Connect-${{ needs.bump-version.outputs.new_version }}-release
          path: "*.apk"
          retention-days: 30

  # ────────────────────────────────────────────────────────────
  # JOB 3 — Create GitHub Release and attach the APK
  # ────────────────────────────────────────────────────────────
  github-release:
    name: 📢 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [bump-version, eas-release-build]

    steps:
      - name: ⬇️ Download APK from previous job
        uses: actions/download-artifact@v4
        with:
          name: IIT-Connect-${{ needs.bump-version.outputs.new_version }}-release

      - name: 🎉 Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "IIT Connect ${{ github.ref_name }}"
          body: |
            ## 🎓 IIT Connect ${{ github.ref_name }}

            ### What's New
            > _Add your release notes here — or use a CHANGELOG.md_

            ### Installation
            1. Download the **IIT-Connect-${{ needs.bump-version.outputs.new_version }}.apk** file below.
            2. On your Android device, enable **"Install from Unknown Sources"**.
            3. Open the APK to install.

            ---
            > Built automatically via EAS Cloud • [View Build on Expo Dashboard](https://expo.dev/accounts)
          draft: false
          prerelease: false
          files: "*.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
